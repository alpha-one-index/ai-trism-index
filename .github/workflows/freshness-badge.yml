name: Data Freshness Badge

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  freshness-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Check link freshness
        id: freshness
        run: |
          TOTAL=0
          VALID=0
          for url in $(grep -rohE 'https?://[^ )"]+' *.md specs/*.md 2>/dev/null | sort -u | head -100); do
            TOTAL=$((TOTAL + 1))
            STATUS=$(curl -sL -o /dev/null -w '%{http_code}' --max-time 10 "$url" 2>/dev/null || echo "000")
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              VALID=$((VALID + 1))
            fi
          done
          if [ "$TOTAL" -gt 0 ]; then
            PCT=$((VALID * 100 / TOTAL))
          else
            PCT=0
          fi
          echo "percent=$PCT" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "valid=$VALID" >> $GITHUB_OUTPUT
          echo "date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Write freshness report
        run: |
          cat > FRESHNESS.md << 'EOF'
          # Data Freshness Report

          | Metric | Value |
          |--------|-------|
          | Links checked | ${{ steps.freshness.outputs.total }} |
          | Links valid | ${{ steps.freshness.outputs.valid }} |
          | Freshness score | ${{ steps.freshness.outputs.percent }}% |
          | Last verified | ${{ steps.freshness.outputs.date }} |

          *Auto-generated by [freshness-badge.yml](.github/workflows/freshness-badge.yml)*
          EOF

      - name: Commit freshness report
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add FRESHNESS.md
          git diff --staged --quiet || git commit -m "chore: update data freshness report [${{ steps.freshness.outputs.percent }}%]"
          git push
