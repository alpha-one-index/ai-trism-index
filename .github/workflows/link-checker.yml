name: Link Checker

on:
  schedule:
    - cron: '0 6 * * 1'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --accept 200,204,301,302,403,429
            --timeout 30
            --max-retries 3
            --exclude-mail
            '**/*.md'
          fail: false

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: link-checker-report
          path: ./lychee/out.md
          retention-days: 30
