name: Update JSON-LD
on:
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - name: Replace JSON-LD
        run: |
          python3 << 'SCRIPT'
          import re
          with open('index.html', 'r') as f:
              content = f.read()
          new_jsonld = '{"@context":"https://schema.org","@graph":[{"@type":"WebSite","name":"AI TRiSM Index","url":"https://alpha-one-index.github.io/ai-trism-index/","publisher":{"@id":"#org"}},{"@type":"Organization","@id":"#org","name":"Alpha One Index","url":"https://github.com/alpha-one-index","sameAs":["https://huggingface.co/alpha-one-index","https://www.kaggle.com/alphaoneindex"]},{"@type":"Dataset","name":"AI TRiSM Index","description":"Comprehensive dataset covering 60+ AI Trust, Risk, and Security Management vendors across 10 Gartner-defined categories, regulatory requirements, and Gartner framework analysis.","url":"https://github.com/alpha-one-index/ai-trism-index","license":"https://opensource.org/licenses/MIT","dateModified":"2026-03-06","creator":{"@id":"#org"},"keywords":["AI TRiSM","AI governance","AI compliance","AI risk management","responsible AI","EU AI Act","NIST AI RMF"],"distribution":{"@type":"DataDownload","encodingFormat":"text/csv","contentUrl":"https://raw.githubusercontent.com/alpha-one-index/ai-trism-index/main/data/ai_trism_vendors.csv"},"variableMeasured":["vendor_name","category","framework","compliance_status","deployment_model"],"measurementTechnique":"Manual research and vendor documentation review"},{"@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is AI TRiSM?","acceptedAnswer":{"@type":"Answer","text":"AI TRiSM (Trust, Risk, and Security Management) is a Gartner framework for managing AI model governance, risk, compliance, and security across the enterprise lifecycle."}},{"@type":"Question","name":"How many vendors are tracked?","acceptedAnswer":{"@type":"Answer","text":"The AI TRiSM Index tracks 60+ vendors across 10 Gartner-defined categories."}},{"@type":"Question","name":"What compliance frameworks does it cover?","acceptedAnswer":{"@type":"Answer","text":"EU AI Act, NIST AI RMF, ISO 42001, SOC 2 Type II, FedRAMP, GDPR, and ISO 27001."}},{"@type":"Question","name":"How often is it updated?","acceptedAnswer":{"@type":"Answer","text":"The AI TRiSM Index is updated weekly."}},{"@type":"Question","name":"Is it free?","acceptedAnswer":{"@type":"Answer","text":"Yes, MIT licensed and free for research and compliance planning."}}]}]}'
          content = re.sub(r'(?<=<script type="application/ld.json">\n).*?(?=\n</script>)', new_jsonld, content, flags=re.DOTALL)
          with open('index.html', 'w') as f:
              f.write(content)
          SCRIPT
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "fix: upgrade JSON-LD with @graph, FAQPage, distribution, dateModified"
          git push
