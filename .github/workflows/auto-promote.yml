name: Auto-Promote & Index

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6 AM UTC
  workflow_dispatch:

jobs:
  ping-search-engines:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Google Sitemap
        run: curl -s "https://www.google.com/ping?sitemap=https://alpha-one-index.github.io/ai-trism-index/sitemap.xml"

      - name: Ping Bing Sitemap
        run: curl -s "https://www.bing.com/ping?sitemap=https://alpha-one-index.github.io/ai-trism-index/sitemap.xml"

      - name: Ping IndexNow (Bing/Yandex/DuckDuckGo)
        run: |
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d '{
              "host": "alpha-one-index.github.io",
              "key": "${{ secrets.INDEXNOW_KEY }}",
              "urlList": [
                "https://alpha-one-index.github.io/ai-trism-index/",
                "https://alpha-one-index.github.io/ai-trism-index/agents/README.md",
                "https://alpha-one-index.github.io/ai-trism-index/agents/owasp-agentic-top10.md",
                "https://alpha-one-index.github.io/ai-trism-index/agents/vendors.csv",
                "https://alpha-one-index.github.io/ai-trism-index/agents/frameworks-at-risk.md",
                "https://alpha-one-index.github.io/ai-trism-index/agents/mcp-security.md",
                "https://alpha-one-index.github.io/ai-trism-index/agents/standards.md",
                "https://alpha-one-index.github.io/ai-trism-index/agents/market-data.json"
              ]
            }'

  refresh-timestamps:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - name: Update lastmod in sitemap
        run: |
          DATE=$(date +%Y-%m-%d)
          sed -i "s/<lastmod>.*<\/lastmod>/<lastmod>${DATE}<\/lastmod>/g" sitemap.xml
      - name: Commit timestamp refresh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git diff --cached --quiet || git commit -m "chore: refresh sitemap timestamps [skip ci]"
          git push

  auto-label-issues:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Auto-create discoverable issues for SEO
        uses: actions/github-script@v7
        with:
          script: |
            const labels = ['a2gs', 'agentic-ai-security', 'owasp-agentic', 'mcp-security'];
            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                  color: '0e8a16',
                  description: `Agentic AI Governance & Security - ${label}`
                });
              } catch (e) {
                // Label already exists
              }
            }
